---
- name: Grep pattern in target file
  hosts: all
  gather_facts: false
  become: true
  vars:
    target_file: "/var/log/messages"
    search_pattern: "ERROR"

  tasks:
    - name: Search pattern in target file
      ansible.builtin.command:
        argv:
          - grep
          - -n
          - --
          - "{{ search_pattern }}"
          - "{{ target_file }}"
      register: grep_result
      changed_when: false
      failed_when: false

    - name: Print matched lines
      ansible.builtin.debug:
        var: grep_result.stdout_lines


