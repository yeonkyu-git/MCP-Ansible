---
- name: Tail target file
  hosts: all
  gather_facts: false
  become: true
  vars:
    target_file: "/var/log/messages"
    tail_lines: 100

  tasks:
    - name: Show last N lines from target file
      ansible.builtin.command: "tail -n {{ tail_lines }} {{ target_file }}"
      register: tail_result
      changed_when: false

    - name: Print tailed lines
      ansible.builtin.debug:
        var: tail_result.stdout_lines


